<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Aides de Jeux — L'Ennemi Intérieur</title>
    <meta name="description" content="Aides de jeux pour la campagne Warhammer Fantasy RPG — L'Ennemi Intérieur.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar"></nav>

    <div class="page-container">

        <!-- Page Header -->
        <div class="page-header fade-in">
            <h1>Aides de Jeux</h1>
            <p>Tu peux naviguer entre les onglets pour accéder aux sorts, aux miracles, aux armes, aux mots clés, etc.
            </p>
        </div>

        <!-- Dynamic Sheet Content -->
        <section class="section" style="padding-top: 0;">
            <div class="container">

                <!-- Open in Google Sheets link -->
                <div style="text-align: center; margin-bottom: var(--space-md);" class="fade-in">
                    <a href="#" class="sheet-open-btn" id="sheet-link" target="_blank" rel="noopener">
                        📎 Ouvrir dans Google Sheets (idéal sur PC)
                    </a>
                </div>

                <!-- Toolbar: Tabs + Search -->
                <div class="sheet-toolbar fade-in">
                    <div class="sheet-tabs" id="sheet-tabs"></div>
                    <div class="sheet-search-wrapper">
                        <span class="sheet-search-icon">🔍</span>
                        <input type="text" class="sheet-search" id="sheet-search"
                            placeholder="Rechercher un sort, une arme, un mot clé...">
                    </div>
                </div>

                <!-- Loading -->
                <div class="sheet-loading" id="sheet-loading">
                    <div class="sheet-spinner"></div>
                    Chargement des données...
                </div>

                <!-- Data Container -->
                <div class="sheet-content" id="sheet-content"></div>



            </div>
        </section>

        <!-- Ornament -->
        <div class="ornament">⚜</div>

        <!-- Footer -->
        <footer class="footer" id="site-footer"></footer>

    </div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/sheets.js"></script>
</body>

</html>
