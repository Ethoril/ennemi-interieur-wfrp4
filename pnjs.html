<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>PNJs — L'Ennemi Intérieur</title>
    <meta name="description" content="Réseau interactif des personnages non-joueurs de la campagne L'Ennemi Intérieur.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
</head>

<body>

    <nav class="navbar" id="navbar"></nav>

    <div class="page-container">

        <div class="page-header fade-in">
            <h1>Personnages</h1>
            <p>Réseau des personnages non-joueurs rencontrés durant la campagne. Clique sur un nœud pour afficher la fiche.</p>
        </div>

        <section class="section" style="padding-top: 0; flex: 1; display: flex; flex-direction: column;">
            <div class="container" style="flex: 1; display: flex; flex-direction: column;">

                <!-- Toolbar -->
                <div class="pnj-toolbar fade-in">

                    <!-- Vue -->
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="graph">⬡ Graphe</button>
                        <button class="view-btn" data-view="table">≡ Tableau</button>
                    </div>

                    <div class="filter-sep">|</div>

                    <!-- Recherche -->
                    <div class="pnj-search-wrapper">
                        <input type="text" id="pnj-search" placeholder="Rechercher un personnage...">
                    </div>

                    <!-- Couleur par (graphe seulement) -->
                    <div class="colorby-group" id="colorby-group">
                        <span class="filter-group-label">Couleur :</span>
                        <button class="colorby-btn active" data-dim="statut">Statut</button>
                        <button class="colorby-btn" data-dim="lieu">Lieu</button>
                        <button class="colorby-btn" data-dim="groupe">Groupe</button>
                    </div>

                    <div class="filter-sep">|</div>

                    <!-- Filtres -->
                    <div class="pnj-filters">
                        <div class="filter-group" id="filter-statut"></div>
                        <div class="filter-sep">|</div>
                        <div class="filter-group" id="filter-vivant"></div>
                        <div class="filter-sep">|</div>
                        <div class="filter-group" id="filter-lieu"></div>
                        <div class="filter-sep">|</div>
                        <div class="filter-group" id="filter-groupe"></div>
                    </div>

                    <!-- Admin -->
                    <div class="pnj-admin-actions">
                        <button class="btn-add-pnj" id="add-pnj-btn" style="display:none">＋ PNJ</button>
                        <button class="btn-auth" id="auth-btn">🔑 Admin</button>
                    </div>

                </div>

                <!-- Graphe -->
                <div id="pnj-graph">
                    <div id="pnj-loading">
                        <div class="pnj-spinner"></div>
                        Chargement des personnages...
                    </div>
                    <div id="pnj-empty" style="display:none;">
                        <p>Aucun personnage pour l'instant.</p>
                        <span class="pnj-empty-hint">Connecte-toi en mode Admin pour en ajouter.</span>
                    </div>
                    <div class="graph-legend" id="graph-legend" style="display:none;"></div>
                </div>

                <!-- Tableau (caché par défaut) -->
                <div id="pnj-table-container" style="display:none;"></div>

            </div>
        </section>

        <!-- Panneau de détail -->
        <div id="pnj-detail" class="pnj-detail-panel">
            <button class="pnj-detail-close" id="pnj-detail-close">✕ Fermer</button>
            <div id="pnj-detail-content"></div>
        </div>

        <!-- Modal cadrage portrait -->
        <div id="crop-modal" class="crop-modal-overlay" style="display:none;">
            <div class="crop-modal-content">
                <h3>Cadrer le portrait</h3>
                <div class="crop-container">
                    <img id="crop-img" src="" alt="Cadrage">
                </div>
                <div class="crop-actions">
                    <button type="button" class="btn-ghost" id="crop-cancel-btn">Annuler</button>
                    <button type="button" class="btn-primary" id="crop-confirm-btn">Utiliser ce cadrage</button>
                </div>
            </div>
        </div>

        <!-- Modal édition PNJ -->
        <div id="pnj-modal" class="pnj-modal-overlay" style="display:none;">
            <div class="pnj-modal-content">
                <h3 id="pnj-modal-title">Nouveau personnage</h3>
                <form id="pnj-form">
                    <div class="form-row">
                        <div class="form-col">
                            <label>Nom *</label>
                            <input type="text" id="f-nom" required placeholder="Nom du personnage">
                        </div>
                        <div class="form-col">
                            <label>Statut</label>
                            <select id="f-statut">
                                <option value="">— Inconnu —</option>
                                <option value="allié">Allié</option>
                                <option value="neutre">Neutre</option>
                                <option value="ennemi">Ennemi</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col">
                            <label>Vivant</label>
                            <select id="f-vivant">
                                <option value="oui">Oui</option>
                                <option value="inconnu">Inconnu</option>
                                <option value="non">Non (décédé)</option>
                            </select>
                        </div>
                        <div class="form-col">
                            <label>Lieu</label>
                            <input type="text" id="f-lieu" placeholder="Altdorf, Bögenhafen…">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col form-col-full">
                            <label>Groupe social</label>
                            <input type="text" id="f-groupe" placeholder="Marchand, Culte, Garde…">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col form-col-full">
                            <label>Description</label>
                            <textarea id="f-description" rows="4" placeholder="Description, notes…"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-col form-col-full">
                            <label>Portrait</label>
                            <input type="file" id="f-image" accept="image/*">
                            <div id="f-image-preview" class="image-preview"></div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-danger" id="pnj-delete-btn" style="display:none">🗑 Supprimer</button>
                        <button type="button" class="btn-ghost" id="pnj-modal-close">Annuler</button>
                        <button type="submit" class="btn-primary" id="pnj-save-btn">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="ornament">⚜</div>
        <footer class="footer" id="site-footer"></footer>

    </div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script type="module" src="js/pnjs.js"></script>
</body>

</html>
