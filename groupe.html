<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Le Groupe — L'Ennemi Intérieur</title>
    <meta name="description"
        content="Les personnages du groupe pour la campagne Warhammer Fantasy RPG — L'Ennemi Intérieur.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fiche.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar"></nav>

    <div class="page-container">

        <!-- Page Header -->
        <div class="page-header fade-in">
            <h1>Le Groupe</h1>
            <p>Les héros qui arpentent les routes dangereuses du Reikland.</p>
        </div>

        <!-- Character Grid -->
        <section class="section" style="padding-top: 0;">
            <div class="container">
                <div class="character-grid stagger-children">

                    <a href="https://docs.google.com/spreadsheets/d/1iRMVabu6zHICw4-e5MV7JwM6E-nRmdqBY5lohyJSmUI/" target="_blank" rel="noopener" class="character-link">
                        <div class="character-card" id="char-bhelgi">
                            <div class="character-portrait">
                                <picture>
                                    <source srcset="img/Bhelgi.webp" type="image/webp">
                                    <img src="img/Bhelgi.png" alt="Bhelgi" loading="lazy">
                                </picture>
                            </div>
                            <div class="character-info">
                                <h3>Bhelgi</h3>
                            </div>
                        </div>
                    </a>

                    <a href="https://docs.google.com/spreadsheets/d/1mxUMxBk1og7lfxrvACt3yACf5oU1B0JMmpPS3V2VzMQ/" target="_blank" rel="noopener" class="character-link">
                        <div class="character-card" id="char-caelel">
                            <div class="character-portrait">
                                <picture>
                                    <source srcset="img/Caelel.webp" type="image/webp">
                                    <img src="img/Caelel.png" alt="Caelel" loading="lazy">
                                </picture>
                            </div>
                            <div class="character-info">
                                <h3>Caelel</h3>
                            </div>
                        </div>
                    </a>

                    <a href="https://docs.google.com/spreadsheets/d/1EiFDYlgMfXJQ7QiGcEtXGCYSHlPdS1M59167r7AEX0c/" target="_blank" rel="noopener" class="character-link">
                        <div class="character-card" id="char-elysia">
                            <div class="character-portrait">
                                <picture>
                                    <source srcset="img/Elysia.webp" type="image/webp">
                                    <img src="img/Elysia.png" alt="Elysia" loading="lazy">
                                </picture>
                            </div>
                            <div class="character-info">
                                <h3>Elysia</h3>
                            </div>
                        </div>
                    </a>

                    <a href="https://docs.google.com/spreadsheets/d/1VhfXa1lyigxWXSGudRZChP1AcPGMbunad8UPiXeVYg0/" target="_blank" rel="noopener" class="character-link">
                        <div class="character-card" id="char-hellaya">
                            <div class="character-portrait">
                                <picture>
                                    <source srcset="img/Hellaya.webp" type="image/webp">
                                    <img src="img/Hellaya.png" alt="Hellaya" loading="lazy">
                                </picture>
                            </div>
                            <div class="character-info">
                                <h3>Hellaya</h3>
                            </div>
                        </div>
                    </a>

                    <a href="https://docs.google.com/spreadsheets/d/1hjf4KEWohuANIQhFm5S8wrbxZfxCRiKLGo8pl-h0_pc/" target="_blank" rel="noopener" class="character-link">
                        <div class="character-card" id="char-wren">
                            <div class="character-portrait">
                                <picture>
                                    <source srcset="img/Wren.webp" type="image/webp">
                                    <img src="img/Wren.png" alt="Wren" loading="lazy">
                                </picture>
                            </div>
                            <div class="character-info">
                                <h3>Wren</h3>
                            </div>
                        </div>
                    </a>

                    <a href="fiche.html" class="character-link">
                        <div class="character-card" id="char-fiche">
                            <div class="character-portrait character-portrait--placeholder">
                                📜
                            </div>
                            <div class="character-info">
                                <h3>Fiche HTML</h3>
                                <p class="char-subtitle">test</p>
                            </div>
                        </div>
                    </a>

                </div>
            </div>
        </section>

        <!-- Ornament -->
        <div class="ornament">⚜</div>

        <!-- Footer -->
        <footer class="footer" id="site-footer"></footer>

    </div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
