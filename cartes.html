<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Cartes — L'Ennemi Intérieur</title>
    <meta name="description" content="Cartes du Vieux Monde pour la campagne Warhammer Fantasy RPG — L'Ennemi Intérieur.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar" id="navbar"></nav>

    <div class="page-container">

        <!-- Page Header -->
        <div class="page-header fade-in">
            <h1>Cartes</h1>
            <p>Explore le Vieux Monde. Clique sur une carte pour l'ouvrir en visionneuse interactive.</p>
        </div>

        <!-- Map Grid -->
        <section class="section" style="padding-top: 0;">
            <div class="container">
                <div class="map-grid stagger-children">

                    <a href="carte.html?map=empire" class="map-card" id="map-empire">
                        <div class="map-thumbnail">
                            <img src="img/thumb-empire.webp" alt="Carte de l'Empire" loading="lazy">
                            <div class="map-zoom-btn">🔍</div>
                        </div>
                        <div class="map-info">
                            <h3>Carte de l'Empire</h3>
                            <p class="map-meta">Vue détaillée de l'Empire</p>
                        </div>
                    </a>

                    <a href="carte.html?map=vieux-monde" class="map-card" id="map-vieux-monde">
                        <div class="map-thumbnail">
                            <img src="img/thumb-vieux-monde.webp" alt="Carte du Vieux Monde" loading="lazy">
                            <div class="map-zoom-btn">🔍</div>
                        </div>
                        <div class="map-info">
                            <h3>Carte du Vieux Monde</h3>
                            <p class="map-meta">Vue d'ensemble du continent</p>
                        </div>
                    </a>

                </div>
            </div>
        </section>

        <!-- Ornament -->
        <div class="ornament">⚜</div>

        <footer class="footer" id="site-footer"></footer>

    </div>

    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
